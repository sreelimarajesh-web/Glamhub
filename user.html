<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamHub | My Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="brand-wrap">
                <span class="logo">GlamHub</span>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="admin.html">Admin</a>
                    <button id="logout-btn" class="btn-secondary" type="button">Logout</button>
                </nav>
            </div>
            <h1 id="welcome-user">My Booking Page</h1>
            <p class="subtext">Create a new booking and manage your reschedules or cancellations.</p>
        </header>

        <main>
            <section class="booking-layout">
                <div class="booking-section">
                    <h2>New Booking</h2>
                    <div id="success-message" class="message success-message" role="alert"></div>
                    <div id="error-message" class="message error-message" role="alert"></div>

                    <form id="booking-form" class="booking-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required readonly>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" name="date" required>
                            </div>
                            <div class="form-group">
                                <label for="time">Time</label>
                                <select id="time" name="time" required>
                                    <option value="" disabled selected>Select a time slot</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="service">Service</label>
                            <select id="service" name="service" required>
                                <option value="" disabled selected>Select a service</option>
                                <option value="Haircut & Styling">Haircut & Styling</option>
                                <option value="Manicure">Manicure</option>
                                <option value="Signature Facial">Signature Facial</option>
                                <option value="Hair Coloring">Hair Coloring</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="notes">Notes</label>
                            <textarea id="notes" name="notes" rows="3"></textarea>
                        </div>

                        <button class="btn-submit" type="submit">Confirm Booking</button>
                    </form>
                </div>

                <aside class="bookings-section">
                    <h2>My Booking Details</h2>
                    <div id="my-bookings-list" class="bookings-list"></div>
                </aside>
            </section>
        </main>
    </div>

    <script src="js/user.js"></script>
</body>
</html>
